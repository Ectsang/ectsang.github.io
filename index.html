<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eric Tsang - Free Games & Apps</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
    }

    .hero {
      text-align: center;
      padding: 60px 20px 40px;
    }

    .hero h1 {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 700;
      color: #fff;
      margin-bottom: 8px;
    }

    .hero p {
      font-size: 1.1rem;
      color: #888;
      max-width: 500px;
      margin: 0 auto;
    }

    .projects {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1a1a2e;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 28px 24px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.15s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.2);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .card-icon {
      font-size: 2.4rem;
    }

    .card h2 {
      font-size: 1.3rem;
      color: #fff;
      font-weight: 600;
    }

    .card p {
      font-size: 0.95rem;
      color: #999;
      line-height: 1.5;
    }

    .card .tag {
      display: inline-block;
      background: rgba(78,168,222,0.15);
      color: #4ea8de;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      align-self: flex-start;
    }

    .coming-soon {
      opacity: 0.5;
      pointer-events: none;
    }

    .coming-soon .tag {
      background: rgba(255,255,255,0.08);
      color: #666;
    }

    footer {
      text-align: center;
      padding: 40px 20px;
      color: #444;
      font-size: 0.85rem;
    }

    footer a {
      color: #666;
      text-decoration: none;
    }

    footer a:hover { color: #aaa; }
  </style>
</head>
<body>

  <div class="projects" style="padding-top: 60px;">
    <a class="card" href="https://ectsang.github.io/kids-flight/">
      <div class="card-icon">✈️</div>
      <h2>Kids in Flight</h2>
      <p>Airplane-mode games for kids. Fly, pop bubbles, tap animals, and learn — all offline on iPad.</p>
      <span class="tag">Play Now</span>
    </a>

    <div class="card coming-soon">
      <div class="card-icon">🧩</div>
      <h2>More Coming Soon</h2>
      <p>New free games and tools are in the works. Check back later.</p>
      <span class="tag">Coming Soon</span>
    </div>
  </div>

  <footer>
    <a href="https://github.com/Ectsang">GitHub</a>
  </footer>

</body>
</html>
